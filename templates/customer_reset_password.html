{% extends "base.html" %}
{% block title %}Redefinir senha | {{ store_name }}{% endblock %}
{% block content %}
<section class="container narrow">
  <form method="post" class="checkout-form">
    <h1>Redefinir senha</h1>
    <label>Nova senha<input type="password" name="password" minlength="8" required /></label>
    <label>Confirmar nova senha<input type="password" name="confirm_password" minlength="8" required /></label>
    <button class="btn" type="submit">Atualizar senha</button>
  </form>
</section>
{% endblock %}
